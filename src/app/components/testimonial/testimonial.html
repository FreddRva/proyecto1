<section class="testimonial-section" *ngIf="data">
  <div class="container">
    <div class="testimonial-content">
      <p class="testimonial-text">"{{ data.text }}"</p>
      <div class="testimonial-author">
        <img [src]="data.image" [alt]="data.author">
        <div>
          <strong>{{ data.author }}</strong><br>
          <small>{{ data.role }}</small>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="cta" style="text-align: center; background: var(--secondary-color);">
  <div class="container">
    <h2>Ready to Build Your Dream Home?</h2>
    <p style="margin-bottom: 30px; color: var(--text-light);">Contact us today for a private consultation.</p>
    <a href="#" class="btn-primary">Get in Touch</a>
  </div>
</section>
